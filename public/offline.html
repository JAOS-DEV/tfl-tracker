<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0284c7" />
    <title>Offline · Where's My Bus?</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #fafafa;
        color: #18181b;
        padding: 24px;
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
      }
      p {
        line-height: 1.5;
        color: #52525b;
      }
      a {
        color: #0284c7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        Live TfL arrival data cannot be refreshed without a network connection.
        Reconnect and reopen the app to resume live updates.
      </p>
      <p>
        Saved favourites, recent routes, and local history remain on this device
        when you return online.
      </p>
      <p><a href="/">Try again</a></p>
    </main>
  </body>
</html>
